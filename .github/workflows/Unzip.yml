name: Unzip minecraft-panel-pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  unzip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip the file
        run: unzip -o minecraft-panel-pro.zip

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push extracted files
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Extract minecraft-panel-pro.zip contents"
            git push
          fi
