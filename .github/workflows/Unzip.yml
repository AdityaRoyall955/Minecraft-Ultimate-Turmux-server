name: Unzip to Root

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  unzip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip and extract to root
        run: |
          unzip -o minecraft-panel-pro.zip
          if [ -d "minecraft-panel-pro" ]; then
            mv minecraft-panel-pro/* .
            rmdir minecraft-panel-pro
          fi

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push extracted files
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Extract minecraft-panel-pro to root folder"
            git push
          fi
