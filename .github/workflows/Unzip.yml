name: Unzip minecraft-panel-pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  unzip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check if zip file exists
        id: check_zip
        run: |
          if [ -f "minecraft-panel-pro.zip" ]; then
            echo "zip_exists=true" >> $GITHUB_OUTPUT
          else
            echo "zip_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Unzip the file
        if: steps.check_zip.outputs.zip_exists == 'true'
        run: |
          unzip -o minecraft-panel-pro.zip
          echo "Zip file extracted successfully"

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push extracted files
        if: steps.check_zip.outputs.zip_exists == 'true'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract minecraft-panel-pro.zip contents"
            git push
